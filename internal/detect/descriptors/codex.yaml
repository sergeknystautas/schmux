name: codex
display_name: codex
description: "OpenAI's Codex CLI coding agent."
docs_url: 'https://github.com/openai/codex'
unlocks:
  - 'Run OpenAI Codex agents (interactive and one-shot)'
detect:
  - type: path_lookup
    command: codex
  - type: npm_global
    package: '@openai/codex'
  - type: homebrew_formula
    name: codex
capabilities: [interactive, oneshot]
model_flag: '-m'
auto_approve_args: ['--dangerously-bypass-approvals-and-sandbox']
instruction:
  dir: '.codex'
  file: 'AGENTS.md'
interactive:
  resume_args: ['resume', '--last']
oneshot:
  base_args: ['exec', '--json', '-m', '{model}']
  schema_flag: '--output-schema'
signaling:
  strategy: cli_flag
  flag: '-c'
  value_template: 'model_instructions_file={path}'
persona:
  strategy: instruction_file
