name: gemini
display_name: gemini
description: "Google's Gemini CLI coding agent."
docs_url: 'https://github.com/google-gemini/gemini-cli'
unlocks:
  - 'Run Gemini agents (interactive)'
detect:
  - type: path_lookup
    command: gemini
  - type: homebrew_formula
    name: gemini-cli
  - type: npm_global
    package: '@google/gemini-cli'
capabilities: [interactive]
model_flag: '--model'
prompt_flag: '-i'
instruction:
  dir: '.gemini'
  file: 'GEMINI.md'
interactive:
  resume_args: ['-r', 'latest']
signaling:
  strategy: instruction_file
persona:
  strategy: instruction_file
