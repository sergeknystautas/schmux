name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'assets/dashboard/website/**'
      - 'assets/dashboard/src/styles/**'
      - 'assets/dashboard/src/components/**'
      - '.github/workflows/website.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: assets/dashboard/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build website
        run: go run ./cmd/build-website
        env:
          VITE_BASE: /

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/website

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
