# .github/workflows/canary.yml
name: Canary
on:
  workflow_dispatch:
    inputs:
      fail:
        type: boolean
        default: false
jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [ "${{ inputs.fail }}" = "true" ]; then echo "deliberate failure for build-monitor testing"; exit 1; fi

