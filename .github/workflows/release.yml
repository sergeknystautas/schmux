name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  quick-tests:
    name: Quick Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: assets/dashboard/package-lock.json

      - name: Enforce API doc updates
        run: scripts/check-api-docs.sh

      - name: Run quick tests
        run: ./test.sh --quick --verbose

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run E2E tests
        run: ./test.sh --e2e --verbose

      - name: Clean up dangling images
        if: always()
        run: docker image prune -af

  scenario-tests:
    name: Scenario Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: assets/dashboard/package-lock.json

      - name: Run scenario tests
        run: ./test.sh --scenarios --verbose

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scenario-test-artifacts
          path: test/scenarios/artifacts/
          retention-days: 7

      - name: Clean up dangling images
        if: always()
        run: docker image prune -af

  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    needs: [quick-tests, e2e-tests, scenario-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: assets/dashboard/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build dashboard assets
        run: |
          go run ./cmd/build-dashboard
          tar -czf dashboard-assets.tar.gz -C assets/dashboard/dist .

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build binaries
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          LDFLAGS="-X github.com/sergeknystautas/schmux/internal/version.Version=${VERSION}"

          GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" -o schmux-darwin-amd64 ./cmd/schmux
          GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o schmux-darwin-arm64 ./cmd/schmux
          GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o schmux-linux-amd64 ./cmd/schmux
          GOOS=linux GOARCH=arm64 go build -ldflags "$LDFLAGS" -o schmux-linux-arm64 ./cmd/schmux

      - name: Generate checksums
        run: sha256sum schmux-* dashboard-assets.tar.gz > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            schmux-darwin-amd64
            schmux-darwin-arm64
            schmux-linux-amd64
            schmux-linux-arm64
            dashboard-assets.tar.gz
            checksums.txt
          generate_release_notes: true
